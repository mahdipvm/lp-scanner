<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LP Scanner — Uniswap V4</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0A0E14;
    --bg-panel: #10151D;
    --bg-panel-2: #151B25;
    --line: #232B38;
    --amber: #FFB000;
    --amber-dim: #8A6412;
    --text: #E6E9EF;
    --text-dim: #8792A2;
    --good: #29D9A0;
    --warn: #FFB000;
    --bad: #FF5C6C;
  }
  *{box-sizing:border-box}
  body{
    background:
      radial-gradient(1200px 600px at 85% -10%, rgba(255,176,0,0.06), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Vazirmatn','IBM Plex Mono',monospace;
  }
  .font-mono{font-family:'IBM Plex Mono',monospace}
  .font-display{font-family:'Space Grotesk','Vazirmatn',sans-serif}
  ::-webkit-scrollbar{height:8px;width:8px}
  ::-webkit-scrollbar-thumb{background:#2A3341;border-radius:4px}
  ::-webkit-scrollbar-track{background:transparent}

  .panel{background:var(--bg-panel);border:1px solid var(--line);border-radius:10px}
  .sweep-wrap{position:relative;width:34px;height:34px}
  .sweep-dot{position:absolute;inset:0;border-radius:50%;border:1.5px solid var(--amber-dim)}
  .sweep-line{position:absolute;top:50%;left:50%;width:15px;height:1.5px;background:linear-gradient(90deg, var(--amber), transparent);transform-origin:0 50%;animation:sweep 2.4s linear infinite}
  @keyframes sweep{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  .blink{animation:blink 1.6s step-start infinite}
  @keyframes blink{50%{opacity:0}}

  .badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.02em;font-family:'IBM Plex Mono',monospace}
  .badge-good{background:rgba(41,217,160,0.12);color:var(--good);border:1px solid rgba(41,217,160,0.3)}
  .badge-warn{background:rgba(255,176,0,0.12);color:var(--warn);border:1px solid rgba(255,176,0,0.3)}
  .badge-bad{background:rgba(255,92,108,0.12);color:var(--bad);border:1px solid rgba(255,92,108,0.3)}
  .badge-neutral{background:rgba(135,146,162,0.1);color:var(--text-dim);border:1px solid rgba(135,146,162,0.25)}

  .score-ring{position:relative;width:44px;height:44px}
  .score-ring svg{transform:rotate(-90deg)}
  .score-ring .val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700}

  th{cursor:pointer;user-select:none;white-space:nowrap}
  th:hover{color:var(--amber)}
  tbody tr{border-top:1px solid var(--line)}
  tbody tr:hover{background:rgba(255,255,255,0.02)}

  input[type=text], input[type=number], input[type=password], select{
    background:var(--bg-panel-2);border:1px solid var(--line);color:var(--text);
    border-radius:6px;padding:6px 10px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;
  }
  input:focus, select:focus{outline:1px solid var(--amber);border-color:var(--amber)}
  .chip{padding:4px 10px;border-radius:6px;border:1px solid var(--line);font-size:12px;cursor:pointer;transition:.15s}
  .chip.active{background:rgba(255,176,0,0.14);border-color:var(--amber);color:var(--amber)}
  .btn-primary{background:var(--amber);color:#1a1200;font-weight:700;border-radius:6px;padding:8px 16px;font-size:13px;transition:.15s}
  .btn-primary:hover{background:#ffc233}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--text-dim);border-radius:6px;padding:8px 14px;font-size:13px}
  .btn-ghost:hover{border-color:var(--amber);color:var(--amber)}

  .skeleton{background:linear-gradient(90deg,#151B25 25%,#1A212C 37%,#151B25 63%);background-size:400% 100%;animation:shimmer 1.4s ease infinite}
  @keyframes shimmer{0%{background-position:100% 0}100%{background-position:0 0}}
</style>
</head>
<body class="min-h-screen">
<div id="app" class="max-w-[1500px] mx-auto p-4 md:p-6"></div>

<script>
/* =========================================================================
   LP SCANNER — Uniswap V4
   ماژول ۱: Data Collector  |  ماژول ۲: Scoring Engine  |  ماژول ۳: IL Risk
   ماژول ۴: Range Efficiency  |  ماژول ۵: Dashboard + فیلتر + هشدار
   ========================================================================= */

const DEFAULT_SUBGRAPH_ID = "ESnjgAG9NjfmHypk4Huu4PVvz55fUwpyrRqHF21thoLJ"; // Uniswap v4, mainnet (رسمی Uniswap docs)
const STABLES = ["USDC","USDT","DAI","FRAX","USDE","LUSD","GHO","USDP","TUSD","PYUSD","USDD","CRVUSD","SUSDE"];
const ETH_SYMS = ["WETH","ETH","WSTETH","RETH","CBETH","STETH"];
const BTC_SYMS = ["WBTC","BTC","CBBTC","TBTC"];
const ZERO_HOOK = "0x0000000000000000000000000000000000000000";

const state = {
  apiKey: "",
  subgraphId: DEFAULT_SUBGRAPH_ID,
  pools: [],
  loading: false,
  error: null,
  lastFetch: null,
  sortKey: "lpScore",
  sortDir: "desc",
  filters: {
    minTVL: "", minVolume: "", minAPR: "",
    stableOnly: false, ethPair: false, btcPair: false, lowRiskOnly: false,
    search: ""
  },
  alertThresholds: { volTvl: 25, feeApr: 25, tvl: 15 }, // % change to trigger
  alerts: [],
  expandedPool: null,
  rangeData: {}, // poolId -> { loading, pct, err }
  weights: { tvl: 0.20, volEff: 0.30, feeYield: 0.35, activity: 0.10, hook: 0.05 }
};

// ---------------------------------------------------------------------
// ماژول ۱: Data Collector
// ---------------------------------------------------------------------
async function gqlRequest(query, variables) {
  const endpoint = `https://gateway.thegraph.com/api/${state.apiKey}/subgraphs/id/${state.subgraphId}`;
  const res = await fetch(endpoint, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ query, variables })
  });
  if (!res.ok) {
    const t = await res.text().catch(()=> "");
    throw new Error(`HTTP ${res.status} ${t.slice(0,200)}`);
  }
  const json = await res.json();
  if (json.errors) throw new Error(json.errors.map(e=>e.message).join("; "));
  return json.data;
}

const POOLS_QUERY = `
query Pools($first: Int!, $skip: Int!) {
  pools(first: $first, skip: $skip, orderBy: totalValueLockedUSD, orderDirection: desc) {
    id
    token0 { symbol decimals }
    token1 { symbol decimals }
    feeTier
    tick
    tickSpacing
    liquidity
    totalValueLockedUSD
    volumeUSD
    feesUSD
    txCount
    hooks
    poolDayData(first: 8, orderBy: date, orderDirection: desc) {
      date
      volumeUSD
      feesUSD
      tvlUSD
      txCount
      open
      high
      low
      close
    }
  }
}`;

const TICKS_QUERY = `
query Ticks($poolId: ID!, $skip: Int!) {
  ticks(where: { pool: $poolId }, first: 1000, skip: $skip, orderBy: tickIdx) {
    tickIdx
    liquidityGross
  }
}`;

async function collectPools(maxPools = 300) {
  state.loading = true; state.error = null; render();
  try {
    let all = [];
    const pageSize = 100;
    for (let skip = 0; skip < maxPools; skip += pageSize) {
      const data = await gqlRequest(POOLS_QUERY, { first: pageSize, skip });
      const batch = data.pools || [];
      all = all.concat(batch);
      if (batch.length < pageSize) break;
    }
    state.pools = all.map(computeMetrics);
    state.lastFetch = new Date();
    checkAlerts(state.pools);
    await saveSnapshot(state.pools);
  } catch (e) {
    state.error = e.message || String(e);
  } finally {
    state.loading = false; render();
  }
}

// ---------------------------------------------------------------------
// ماژول ۲: LP Scoring Engine + ماژول ۳: IL Risk
// ---------------------------------------------------------------------
function clamp(v, lo=0, hi=100){ return Math.max(lo, Math.min(hi, v)); }

function computeMetrics(p) {
  const tvl = parseFloat(p.totalValueLockedUSD) || 0;
  const days = (p.poolDayData || []).slice().sort((a,b)=>b.date-a.date);
  const today = days[0] || {};
  const volume24h = parseFloat(today.volumeUSD) || 0;
  const fees24h = parseFloat(today.feesUSD) || 0;
  const tx24h = parseFloat(today.txCount) || 0;

  // --- Volume Efficiency: Volume/TVL ---
  const volToTvl = tvl > 0 ? volume24h / tvl : 0;
  const TARGET_VOL_RATIO = 2.0; // گردش ۲ برابر TVL در روز = امتیاز کامل
  const volEffScore = clamp(100 * (volToTvl / TARGET_VOL_RATIO));

  // --- Fee Yield: (Fees/TVL) * Annualization ---
  const feeAprRaw = tvl > 0 ? (fees24h / tvl) * 365 * 100 : 0; // %
  const TARGET_APR = 100; // ۱۰۰٪ APR = امتیاز کامل
  const feeYieldScore = clamp(100 * (feeAprRaw / TARGET_APR));

  // --- TVL Score: جریمه استخرهای کوچک ---
  let tvlScore;
  if (tvl < 10000) {
    tvlScore = clamp((tvl / 10000) * 25);
  } else {
    tvlScore = clamp(30 + 70 * (Math.log10(tvl / 10000) / Math.log10(1000))); // تا ~۱۰M دلار امتیاز کامل
  }

  // --- Activity Score ---
  const TARGET_TX = 400;
  const activityScore = clamp(100 * (tx24h / TARGET_TX));

  // --- Hook Safety ---
  const hookAddr = (p.hooks || ZERO_HOOK).toLowerCase();
  const isNoHook = hookAddr === ZERO_HOOK.toLowerCase();
  const hookScore = isNoHook ? 100 : 45; // هوک ناشناخته = ریسک بالاتر (بدون رجیستری آنچین معتبر برای اعتبارسنجی)

  const w = state.weights;
  const lpScore = clamp(
    w.tvl*tvlScore + w.volEff*volEffScore + w.feeYield*feeYieldScore +
    w.activity*activityScore + w.hook*hookScore
  );

  // --- IL Risk: Volatility = (high-low)/close, میانگین روزهای موجود ---
  let volSum = 0, volCount = 0;
  days.forEach(d => {
    const close = parseFloat(d.close);
    const high = parseFloat(d.high);
    const low = parseFloat(d.low);
    if (close > 0) { volSum += (high - low) / close; volCount++; }
  });
  const avgVolatility = volCount > 0 ? volSum / volCount : 0;
  let ilRisk = "کم", ilRiskLevel = "good";
  if (avgVolatility > 0.08) { ilRisk = "بالا"; ilRiskLevel = "bad"; }
  else if (avgVolatility > 0.03) { ilRisk = "متوسط"; ilRiskLevel = "warn"; }

  const riskAdjustedScore = clamp(lpScore * (1 - Math.min(0.6, avgVolatility * 3)));

  const sym0 = p.token0?.symbol || "?";
  const sym1 = p.token1?.symbol || "?";
  const isStable = STABLES.includes(sym0.toUpperCase()) || STABLES.includes(sym1.toUpperCase());
  const isEthPair = ETH_SYMS.includes(sym0.toUpperCase()) || ETH_SYMS.includes(sym1.toUpperCase());
  const isBtcPair = BTC_SYMS.includes(sym0.toUpperCase()) || BTC_SYMS.includes(sym1.toUpperCase());

  return {
    ...p, sym0, sym1, tvl, volume24h, fees24h, tx24h,
    feeAprRaw, volToTvl, tvlScore, volEffScore, feeYieldScore, activityScore, hookScore,
    lpScore, avgVolatility, ilRisk, ilRiskLevel, riskAdjustedScore,
    isNoHook, isStable, isEthPair, isBtcPair,
    feeTierPct: (parseFloat(p.feeTier) / 10000).toFixed(2)
  };
}

// ---------------------------------------------------------------------
// ماژول ۴: Range Efficiency (V4 Concentrated Liquidity)
// ---------------------------------------------------------------------
async function loadRangeEfficiency(pool) {
  state.rangeData[pool.id] = { loading: true }; render();
  try {
    let ticks = [];
    for (let skip = 0; skip < 3000; skip += 1000) {
      const data = await gqlRequest(TICKS_QUERY, { poolId: pool.id, skip });
      const batch = data.ticks || [];
      ticks = ticks.concat(batch);
      if (batch.length < 1000) break;
    }
    const currentTick = parseFloat(pool.tick) || 0;
    const spacing = parseFloat(pool.tickSpacing) || 60;
    const windowSize = spacing * 10; // بازه فعال حول قیمت فعلی (قابل تنظیم)
    let totalLiq = 0, activeLiq = 0;
    ticks.forEach(t => {
      const g = Math.abs(parseFloat(t.liquidityGross) || 0);
      totalLiq += g;
      if (Math.abs(t.tickIdx - currentTick) <= windowSize) activeLiq += g;
    });
    const pct = totalLiq > 0 ? (activeLiq / totalLiq) * 100 : null;
    state.rangeData[pool.id] = { loading: false, pct, tickCount: ticks.length };
  } catch (e) {
    state.rangeData[pool.id] = { loading: false, err: e.message };
  }
  render();
}

// ---------------------------------------------------------------------
// Alerts + persistent snapshot (localStorage)
// ---------------------------------------------------------------------
async function loadSnapshot() {
  try {
    const v = localStorage.getItem("lp-scanner:last-snapshot");
    return v ? JSON.parse(v) : null;
  } catch (e) { return null; }
}
async function saveSnapshot(pools) {
  try {
    const compact = {};
    pools.forEach(p => { compact[p.id] = { tvl: p.tvl, volToTvl: p.volToTvl, feeAprRaw: p.feeAprRaw, t: Date.now() }; });
    localStorage.setItem("lp-scanner:last-snapshot", JSON.stringify(compact));
  } catch (e) { /* ignore */ }
}
async function checkAlerts(pools) {
  const prev = await loadSnapshot();
  const newAlerts = [];
  if (prev) {
    pools.forEach(p => {
      const old = prev[p.id];
      if (!old || old.tvl <= 0) return;
      const pair = `${p.sym0}/${p.sym1} (${p.feeTierPct}%)`;
      const tvlChange = ((p.tvl - old.tvl) / old.tvl) * 100;
      const aprChange = old.feeAprRaw > 0 ? ((p.feeAprRaw - old.feeAprRaw) / old.feeAprRaw) * 100 : 0;
      const volTvlChange = old.volToTvl > 0 ? ((p.volToTvl - old.volToTvl) / old.volToTvl) * 100 : 0;
      if (tvlChange >= state.alertThresholds.tvl) newAlerts.push({ pool: pair, type: "رشد TVL", detail: `+${tvlChange.toFixed(1)}%` });
      if (aprChange >= state.alertThresholds.feeApr) newAlerts.push({ pool: pair, type: "افزایش Fee APR", detail: `+${aprChange.toFixed(1)}%` });
      if (volTvlChange >= state.alertThresholds.volTvl) newAlerts.push({ pool: pair, type: "افزایش Volume/TVL", detail: `+${volTvlChange.toFixed(1)}%` });
    });
  }
  state.alerts = newAlerts;
}

// ---------------------------------------------------------------------
// Filtering + Sorting
// ---------------------------------------------------------------------
function getFilteredSorted() {
  let rows = state.pools.slice();
  const f = state.filters;
  if (f.minTVL) rows = rows.filter(p => p.tvl >= parseFloat(f.minTVL));
  if (f.minVolume) rows = rows.filter(p => p.volume24h >= parseFloat(f.minVolume));
  if (f.minAPR) rows = rows.filter(p => p.feeAprRaw >= parseFloat(f.minAPR));
  if (f.stableOnly) rows = rows.filter(p => p.isStable);
  if (f.ethPair) rows = rows.filter(p => p.isEthPair);
  if (f.btcPair) rows = rows.filter(p => p.isBtcPair);
  if (f.lowRiskOnly) rows = rows.filter(p => p.ilRiskLevel === "good" && p.isNoHook);
  if (f.search) {
    const s = f.search.toUpperCase();
    rows = rows.filter(p => (p.sym0+"/"+p.sym1).toUpperCase().includes(s));
  }
  rows.sort((a,b) => {
    const dir = state.sortDir === "asc" ? 1 : -1;
    const av = a[state.sortKey], bv = b[state.sortKey];
    if (typeof av === "string") return av.localeCompare(bv) * dir;
    return ((av||0) - (bv||0)) * dir;
  });
  return rows;
}

function setSort(key) {
  if (state.sortKey === key) state.sortDir = state.sortDir === "asc" ? "desc" : "asc";
  else { state.sortKey = key; state.sortDir = "desc"; }
  render();
}

// ---------------------------------------------------------------------
// Rendering
// ---------------------------------------------------------------------
function fmtUsd(v) {
  if (v == null || isNaN(v)) return "—";
  if (v >= 1e9) return "$" + (v/1e9).toFixed(2) + "B";
  if (v >= 1e6) return "$" + (v/1e6).toFixed(2) + "M";
  if (v >= 1e3) return "$" + (v/1e3).toFixed(1) + "K";
  return "$" + v.toFixed(2);
}
function fmtPct(v, digits=1) { return isFinite(v) ? v.toFixed(digits) + "%" : "—"; }

function scoreColor(score) {
  if (score >= 70) return "var(--good)";
  if (score >= 45) return "var(--warn)";
  return "var(--bad)";
}
function scoreRing(score) {
  const c = scoreColor(score);
  const r = 18, circ = 2*Math.PI*r;
  const off = circ * (1 - score/100);
  return `<div class="score-ring">
    <svg width="44" height="44"><circle cx="22" cy="22" r="${r}" stroke="#232B38" stroke-width="4" fill="none"/>
    <circle cx="22" cy="22" r="${r}" stroke="${c}" stroke-width="4" fill="none" stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round"/></svg>
    <div class="val" style="color:${c}">${Math.round(score)}</div>
  </div>`;
}
function riskBadge(level, label) {
  const cls = level === "good" ? "badge-good" : level === "warn" ? "badge-warn" : "badge-bad";
  return `<span class="badge ${cls}">${label}</span>`;
}

function headerCell(label, key) {
  const active = state.sortKey === key;
  const arrow = active ? (state.sortDir === "asc" ? "▲" : "▼") : "";
  return `<th onclick="setSort('${key}')" class="px-3 py-2 text-xs text-[var(--text-dim)] font-mono ${active ? 'text-[var(--amber)]' : ''}">${label} <span class="text-[10px]">${arrow}</span></th>`;
}

function render() {
  const app = document.getElementById("app");
  const rows = state.pools.length ? getFilteredSorted() : [];

  app.innerHTML = `
    <!-- Header -->
    <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
      <div class="flex items-center gap-3">
        <div class="sweep-wrap"><div class="sweep-dot"></div><div class="sweep-line"></div></div>
        <div>
          <h1 class="font-display text-xl md:text-2xl font-bold tracking-tight">LP <span style="color:var(--amber)">SCANNER</span></h1>
          <div class="text-xs text-[var(--text-dim)] font-mono">Uniswap V4 · Pool Intelligence Terminal</div>
        </div>
      </div>
      <div class="text-xs text-[var(--text-dim)] font-mono text-left">
        ${state.lastFetch ? `آخرین بروزرسانی: ${state.lastFetch.toLocaleTimeString('fa-IR')}` : ''}
        ${state.loading ? `<span class="blink" style="color:var(--amber)">● در حال اسکن...</span>` : ''}
      </div>
    </div>

    ${renderConfigPanel()}
    ${state.pools.length ? renderAlerts() : ''}
    ${state.pools.length ? renderFilters() : ''}
    ${state.error ? `<div class="panel p-4 mb-4 text-sm" style="border-color:var(--bad);color:var(--bad)">خطا: ${state.error}</div>` : ''}
    ${state.loading && !state.pools.length ? renderSkeleton() : ''}
    ${state.pools.length ? renderTable(rows) : (!state.loading ? renderEmpty() : '')}
  `;
  bindConfigEvents();
  bindFilterEvents();
}

function renderConfigPanel() {
  return `
  <div class="panel p-4 mb-4">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-3 items-end">
      <div class="md:col-span-2">
        <label class="text-xs text-[var(--text-dim)] block mb-1">The Graph API Key</label>
        <input id="cfg-apikey" type="password" placeholder="کلید API خودتان از thegraph.com" value="${state.apiKey}" class="w-full"/>
      </div>
      <div class="md:col-span-1">
        <label class="text-xs text-[var(--text-dim)] block mb-1">Subgraph ID</label>
        <input id="cfg-subgraph" type="text" value="${state.subgraphId}" class="w-full"/>
      </div>
      <div class="flex gap-2">
        <button id="btn-scan" class="btn-primary flex-1" ${state.loading ? "disabled" : ""}>${state.loading ? "در حال اسکن..." : "اسکن استخرها"}</button>
      </div>
    </div>
    <div class="text-[11px] text-[var(--text-dim)] mt-2 leading-5">
      کلید API را از <a href="https://thegraph.com/studio/apikeys" target="_blank" class="underline" style="color:var(--amber)">thegraph.com</a> بگیرید (رایگان با سقف رایگان ماهانه). این کلید فقط در همین دستگاه/حساب شما ذخیره می‌شود و به سرور مشترکی ارسال نمی‌گردد، اما در هر حال آن را محرمانه نگه دارید.
    </div>
  </div>`;
}

function renderAlerts() {
  if (!state.alerts.length) return "";
  return `
  <div class="panel p-3 mb-4" style="border-color:var(--amber-dim)">
    <div class="text-xs font-mono mb-2" style="color:var(--amber)">⚠ هشدارها (${state.alerts.length})</div>
    <div class="flex flex-wrap gap-2">
      ${state.alerts.map(a => `<span class="badge badge-warn">${a.pool} · ${a.type} ${a.detail}</span>`).join("")}
    </div>
  </div>`;
}

function renderFilters() {
  const f = state.filters;
  return `
  <div class="panel p-3 mb-4 flex flex-wrap items-center gap-2">
    <input id="f-search" type="text" placeholder="جستجوی توکن..." value="${f.search}" class="w-32"/>
    <input id="f-minTVL" type="number" placeholder="حداقل TVL $" value="${f.minTVL}" class="w-28"/>
    <input id="f-minVolume" type="number" placeholder="حداقل حجم ۲۴س $" value="${f.minVolume}" class="w-32"/>
    <input id="f-minAPR" type="number" placeholder="حداقل APR %" value="${f.minAPR}" class="w-24"/>
    <div class="w-px h-6 bg-[var(--line)] mx-1"></div>
    <div id="chip-stable" class="chip ${f.stableOnly?'active':''}">فقط استیبل‌کوین</div>
    <div id="chip-eth" class="chip ${f.ethPair?'active':''}">جفت ETH</div>
    <div id="chip-btc" class="chip ${f.btcPair?'active':''}">جفت BTC</div>
    <div id="chip-lowrisk" class="chip ${f.lowRiskOnly?'active':''}">فقط ریسک پایین</div>
    <div class="text-xs text-[var(--text-dim)] mr-auto font-mono">${getFilteredSorted().length} / ${state.pools.length} استخر</div>
  </div>`;
}

function renderSkeleton() {
  return `<div class="panel p-4">${Array(6).fill(0).map(()=>`<div class="skeleton h-10 rounded mb-2"></div>`).join("")}</div>`;
}
function renderEmpty() {
  return `<div class="panel p-10 text-center text-[var(--text-dim)] text-sm">
    برای شروع، کلید The Graph API را وارد کنید و روی «اسکن استخرها» بزنید.
  </div>`;
}

function renderTable(rows) {
  return `
  <div class="panel overflow-x-auto">
    <table class="w-full text-sm">
      <thead>
        <tr class="text-right">
          <th class="px-3 py-2 text-xs text-[var(--text-dim)]">#</th>
          <th class="px-3 py-2 text-xs text-[var(--text-dim)]">استخر</th>
          <th class="px-3 py-2 text-xs text-[var(--text-dim)]">Fee</th>
          ${headerCell("TVL","tvl")}
          ${headerCell("حجم ۲۴س","volume24h")}
          ${headerCell("Fees","fees24h")}
          ${headerCell("Fee APR","feeAprRaw")}
          ${headerCell("Vol/TVL","volToTvl")}
          <th class="px-3 py-2 text-xs text-[var(--text-dim)]">ریسک IL</th>
          <th class="px-3 py-2 text-xs text-[var(--text-dim)]">ریسک Hook</th>
          ${headerCell("LP Score","lpScore")}
          <th class="px-3 py-2 text-xs text-[var(--text-dim)]"></th>
        </tr>
      </thead>
      <tbody>
        ${rows.map((p, i) => renderRow(p, i)).join("")}
      </tbody>
    </table>
  </div>`;
}

function renderRow(p, i) {
  const expanded = state.expandedPool === p.id;
  const rangeInfo = state.rangeData[p.id];
  let rangeHtml = "";
  if (expanded) {
    if (!rangeInfo || rangeInfo.loading) {
      rangeHtml = `<div class="text-xs text-[var(--text-dim)] font-mono">در حال محاسبه Range Efficiency...</div>`;
    } else if (rangeInfo.err) {
      rangeHtml = `<div class="text-xs" style="color:var(--bad)">خطا: ${rangeInfo.err}</div>`;
    } else {
      const pct = rangeInfo.pct;
      rangeHtml = `<div class="text-xs font-mono">
        <span class="text-[var(--text-dim)]">درصد نقدینگی در محدوده فعال (±۱۰ بازه تیک حول قیمت فعلی):</span>
        <span style="color:${scoreColor(pct)}" class="font-bold"> ${pct != null ? pct.toFixed(1)+'%' : '—'}</span>
        <span class="text-[var(--text-dim)]"> · بر اساس ${rangeInfo.tickCount} تیک</span>
      </div>`;
    }
  }
  return `
  <tr>
    <td class="px-3 py-3 text-[var(--text-dim)] font-mono">${i+1}</td>
    <td class="px-3 py-3">
      <div class="font-semibold">${p.sym0}/${p.sym1}</div>
      <div class="text-[10px] text-[var(--text-dim)] font-mono">${p.id.slice(0,10)}...</div>
    </td>
    <td class="px-3 py-3 font-mono text-xs">${p.feeTierPct}%</td>
    <td class="px-3 py-3 font-mono">${fmtUsd(p.tvl)}</td>
    <td class="px-3 py-3 font-mono">${fmtUsd(p.volume24h)}</td>
    <td class="px-3 py-3 font-mono">${fmtUsd(p.fees24h)}</td>
    <td class="px-3 py-3 font-mono" style="color:${scoreColor(clamp(p.feeAprRaw))}">${fmtPct(p.feeAprRaw)}</td>
    <td class="px-3 py-3 font-mono">${p.volToTvl.toFixed(2)}x</td>
    <td class="px-3 py-3">${riskBadge(p.ilRiskLevel, p.ilRisk)}</td>
    <td class="px-3 py-3">${p.isNoHook ? riskBadge("good","بدون هوک") : riskBadge("warn","ناشناخته")}</td>
    <td class="px-3 py-3">${scoreRing(p.lpScore)}</td>
    <td class="px-3 py-3">
      <button onclick="toggleExpand('${p.id}')" class="text-xs" style="color:var(--amber)">${expanded ? "بستن ▲" : "جزئیات ▼"}</button>
    </td>
  </tr>
  ${expanded ? `<tr><td colspan="12" class="px-3 pb-3 pt-0" style="background:rgba(255,255,255,0.015)">
    <div class="grid grid-cols-2 md:grid-cols-6 gap-3 text-xs font-mono py-2">
      <div><div class="text-[var(--text-dim)]">TVL Score</div><div style="color:${scoreColor(p.tvlScore)}">${p.tvlScore.toFixed(0)}</div></div>
      <div><div class="text-[var(--text-dim)]">Volume Eff.</div><div style="color:${scoreColor(p.volEffScore)}">${p.volEffScore.toFixed(0)}</div></div>
      <div><div class="text-[var(--text-dim)]">Fee Yield</div><div style="color:${scoreColor(p.feeYieldScore)}">${p.feeYieldScore.toFixed(0)}</div></div>
      <div><div class="text-[var(--text-dim)]">Activity</div><div style="color:${scoreColor(p.activityScore)}">${p.activityScore.toFixed(0)}</div></div>
      <div><div class="text-[var(--text-dim)]">Hook Safety</div><div style="color:${scoreColor(p.hookScore)}">${p.hookScore.toFixed(0)}</div></div>
      <div><div class="text-[var(--text-dim)]">Score تعدیل‌شده با ریسک</div><div style="color:${scoreColor(p.riskAdjustedScore)}">${p.riskAdjustedScore.toFixed(0)}</div></div>
    </div>
    <div class="mb-2">${rangeHtml || `<button onclick="loadRangeEfficiency(${JSON.stringify(p).replace(/"/g,'&quot;')})" class="btn-ghost text-xs">محاسبه Range Efficiency</button>`}</div>
  </td></tr>` : ""}
  `;
}

function toggleExpand(id) {
  state.expandedPool = state.expandedPool === id ? null : id;
  render();
}

function bindConfigEvents() {
  const apiInput = document.getElementById("cfg-apikey");
  const subInput = document.getElementById("cfg-subgraph");
  const btn = document.getElementById("btn-scan");
  if (apiInput) apiInput.oninput = e => state.apiKey = e.target.value;
  if (subInput) subInput.oninput = e => state.subgraphId = e.target.value;
  if (btn) btn.onclick = () => {
    if (!state.apiKey) { state.error = "لطفاً کلید The Graph API را وارد کنید."; render(); return; }
    collectPools();
  };
}

function bindFilterEvents() {
  const map = { "f-search":"search", "f-minTVL":"minTVL", "f-minVolume":"minVolume", "f-minAPR":"minAPR" };
  Object.entries(map).forEach(([id, key]) => {
    const el = document.getElementById(id);
    if (el) el.oninput = e => { state.filters[key] = e.target.value; render(); };
  });
  const chips = { "chip-stable":"stableOnly", "chip-eth":"ethPair", "chip-btc":"btcPair", "chip-lowrisk":"lowRiskOnly" };
  Object.entries(chips).forEach(([id, key]) => {
    const el = document.getElementById(id);
    if (el) el.onclick = () => { state.filters[key] = !state.filters[key]; render(); };
  });
}

// init: try to restore api key + subgraph id from localStorage (convenience)
(function init() {
  try {
    const savedKey = localStorage.getItem("lp-scanner:apikey");
    const savedSub = localStorage.getItem("lp-scanner:subgraphid");
    if (savedKey) state.apiKey = savedKey;
    if (savedSub) state.subgraphId = savedSub;
  } catch(e) {}
  render();
})();

// persist api key + subgraph id whenever they change
document.addEventListener("blur", (e) => {
  try {
    if (e.target && e.target.id === "cfg-apikey" && state.apiKey) {
      localStorage.setItem("lp-scanner:apikey", state.apiKey);
    }
    if (e.target && e.target.id === "cfg-subgraph" && state.subgraphId) {
      localStorage.setItem("lp-scanner:subgraphid", state.subgraphId);
    }
  } catch(e) {}
}, true);
</script>
</body>
</html>
